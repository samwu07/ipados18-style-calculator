name: Build TrollStore IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Patch compact layout safety
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p = Path('iPadOS18StyleCalculator/CalculatorApp.swift')
          s = p.read_text()
          s = s.replace('let scroll = sci && (!wide || g.size.height < 780)', 'let targetH: CGFloat = sci ? (wide ? 70 : 76) : (wide ? (narrow ? 78 : 112) : (narrow ? 78 : 96))\n            let scroll = keyH < targetH - 1 || (!wide && narrow) || (sci && !wide) || g.size.height < 760')
          s = s.replace('f.numberStyle=.decimal', 'f.numberStyle = .decimal')
          s = s.replace('f.usesGroupingSeparator=true', 'f.usesGroupingSeparator = true')
          s = s.replace('f.groupingSeparator=","', 'f.groupingSeparator = ","')
          s = s.replace('f.maximumFractionDigits=10', 'f.maximumFractionDigits = 10')
          s = s.replace('f.maximumFractionDigits=8', 'f.maximumFractionDigits = 8')
          s = s.replace('f.maximumFractionDigits=2', 'f.maximumFractionDigits = 2')
          s = s.replace('f.minimumFractionDigits=2', 'f.minimumFractionDigits = 2')
          p.write_text(s)
          PY

      - name: Build iPad app without Apple signing
        run: |
          set -euo pipefail
          xcodebuild \
            -project iPadOS18StyleCalculator.xcodeproj \
            -scheme iPadOS18StyleCalculator \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          rm -rf build/Payload build/ipa
          mkdir -p build/Payload build/ipa
          cp -R "$APP_PATH" build/Payload/
          ditto -c -k --keepParent build/Payload build/ipa/iPadOS18StyleCalculator-TrollStore.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iPadOS18StyleCalculator-TrollStore-IPA
          path: build/ipa/iPadOS18StyleCalculator-TrollStore.ipa
          if-no-files-found: error
